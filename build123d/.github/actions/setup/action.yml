name: 'Setup'
inputs:
  python-version:  # id of input
    description: "Python version"
    required: true
  optional-dependencies:
    description: "Optional build123d dependencies"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: false
        python-version: ${{ env.PYTHON_INPUT_VER }}
        activate-environment: true
      env:
        PYTHON_INPUT_VER: ${{ inputs.python-version }}
    - name: Install Requirements
      shell: bash
      run: |
        uv pip install .["$OPTIONAL_DEPS"]
      env:
        OPTIONAL_DEPS: ${{ inputs.optional-dependencies }}
